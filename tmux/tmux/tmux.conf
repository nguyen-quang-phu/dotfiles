# Reload config
bind r source-file ~/.config/tmux/tmux.conf

set -g prefix C-g
set -g base-index 1
setw -g pane-base-index 1
# set -g status on
set -g automatic-rename off
set -g allow-passthrough on
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",-256color:Tc"

set -g status-position top
set -g status-justify left 
set -g status-style 'fg=colour255'
set -g status-left ''
set -g status-right '#{?window_zoomed_flag,🔍,}'
set -g status-right-length 50
set -g status-left-length 10

setw -g window-status-current-style 'fg=colour253 bg=colour236 bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-style 'fg=colour255 dim'
setw -g window-status-format '#I:#W #[fg=colour0] '
setw -g window-status-bell-style 'fg=colour1 bg=colour1 bold'

# Set vi key bindings for copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
set -s copy-command 'pbcopy'
bind-key -T copy-mode-vi y send -X copy-pipe-no-clear 'pbcopy'
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'pbcopy'
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'

bind-key -T copy-mode-vi h send-keys -X cursor-left
bind-key -T copy-mode-vi j send-keys -X cursor-down
bind-key -T copy-mode-vi k send-keys -X cursor-up
bind-key -T copy-mode-vi l send-keys -X cursor-right

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Move focus between panes using Alt + hjkl
bind-key -n M-h if-shell -F "#{pane_at_left}"  "previous-window" "select-pane -L"
bind-key -n M-l if-shell -F "#{pane_at_right}" "next-window"     "select-pane -R"
bind-key -n M-k if-shell -F "#{pane_at_top}"   "previous-window" "select-pane -U"
bind-key -n M-j if-shell -F "#{pane_at_bottom}" "next-window"    "select-pane -D"
bind-key -n M-f resize-pane -Z

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

bind-key w switch-client -T window
bind-key p switch-client -T panel
bind-key s switch-client -T session

bind-key -T session n command-prompt -p "New session name:" "new-session -s '%%'" \; switch-client -T prefix
bind-key -T session r command-prompt -I "#S" "rename-session '%%'" \; switch-client -T prefix
bind-key -T session l display-popup -E "tmux choose-session" \; switch-client -T prefix
bind-key -T session x kill-session \; switch-client -T prefix

bind-key -T window n new-window \; switch-client -T prefix
bind-key -T window r command-prompt -I "#W" "rename-window '%%'" \; switch-client -T prefix
bind-key -T window l choose-window \; switch-client -T prefix
bind-key -T window x kill-window \; switch-client -T prefix
bind-key -T window m switch-client -T move-window
bind-key -T window q switch-client -T prefix

bind -T move-window h swap-window -t -1
bind -T move-window l swap-window -t +1
bind -T move-window q switch-client -T prefix

bind-key -T panel n split-window -h \; switch-client -T prefix
bind-key -T panel v split-window -h \; switch-client -T prefix
bind-key -T panel h split-window -v \; switch-client -T prefix
bind-key -T panel m switch-client -T move-pane
bind-key -T panel x kill-pane \; switch-client -T prefix

bind-key -T move-pane h swap-pane -L
bind-key -T move-pane l swap-pane -R
bind-key -T move-pane k swap-pane -U
bind-key -T move-pane j swap-pane -D
bind-key -T move-pane q switch-client -T prefix

set -g aggressive-resize on
set-hook -g client-attached 'resize-window -A'
# set-window-option -g allow-rename off
# set-window-option -g automatic-rename off

# catppuccin
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_text " #I:#W "
set -g @catppuccin_window_current_text " #I:#W "
set -g @catppuccin_window_current_number_color "yellow"
set -g @catppuccin_window_current_text_color "yellow"
set -g status-right-length 100
set -g status-left-length 100
# set -g status-left "[#S] "
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -g status-style "bg=#{@catppuccin_mantle} fg=#{@catppuccin_text}"

set -g @transient-status-delay '0.5'
set -g @transient-status-stall '2.5'
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin 'thesast/tmux-transient-status'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmuxpack/tpack'
set -g @plugin 'tmux-plugins/tmux-sensible'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
