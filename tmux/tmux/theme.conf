# Catppuccin
set -g @catppuccin_flavor 'mocha'
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
set -g @catppuccin_window_status_style "custom"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_middle_separator ""
set -g @catppuccin_window_right_separator ""
# set -g @catppuccin_window_text " #I:#W "
# set -g @catppuccin_window_current_text " #I:#W "
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_number " #I "
# set -g @catppuccin_window_current_number_color "yellow"
# set -g @catppuccin_window_current_text_color "yellow"

set -g status-left "#{E:@catppuccin_status_session} "
set -g status-left-length 100

set -gF status-right "#{E:@catppuccin_status_pomodoro_plus}"
set -agF status-right "#{E:@catppuccin_status_application}"
# set -agF status-right "#{E:@catppuccin_status_cpu}"
# set -ag status-right "#{E:@catppuccin_status_session}"
# set -ag status-right "#{E:@catppuccin_status_uptime}"
# set -agF status-right "#{E:@catppuccin_status_battery}"
set -g status-style "bg=#{@catppuccin_mantle} fg=#{@catppuccin_text}"

