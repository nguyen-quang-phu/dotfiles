# Switch key tables
bind w switch-client -T window
bind p switch-client -T panel
bind s switch-client -T session

# ---------------- SESSION TABLE ----------------
bind -T session n command-prompt -p "New session name:" "new-session -s '%%'"
bind -T session r command-prompt -I "#S" "rename-session '%%'"
bind -T session l run-shell "tmux choose-tree -s"
bind -T session x kill-session
bind -T session s display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh


# ---------------- WINDOW TABLE ----------------
bind -T window n new-window
bind -T window r command-prompt -I "#W" "rename-window '%%'"
bind -T window l choose-window
bind -T window x kill-window
bind -T window m switch-client -T move-window
bind -T window q switch-client -T root

# Move window table
bind -T move-window h swap-window -t -1
bind -T move-window l swap-window -t +1
bind -T move-window q switch-client -T root

# ---------------- PANEL TABLE ----------------
bind -T panel n split-window -h
bind -T panel v split-window -v
# bind -T panel h split-window -v
bind -T panel m switch-client -T move-pane
bind -T panel x kill-pane
bind -T panel o kill-pane -a

# Move pane table
bind -T move-pane h swap-pane -t '{left}'
bind -T move-pane l swap-pane -t '{right}'
bind -T move-pane k swap-pane -t '{up}'
bind -T move-pane j swap-pane -t '{down}'
bind -T move-pane q switch-client -T root

bind c copy-mode
